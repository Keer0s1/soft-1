<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VideoMaker — сценарий в видео</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <h1>🎬 VideoMaker</h1>
  <div id="badges">
    <span class="badge" id="badge-balance">Voicer: …</span>
    <span class="badge" id="badge-video">Видео: …</span>
  </div>
</header>

<main>
  <section class="card">
    <h2>Новое видео</h2>
    <form id="job-form">
      <label>Сценарий (txt)
        <input type="file" name="script" accept=".txt,text/plain" required>
        <small>Формат: кусок текста, затем строка <code>IMG: промт картинки</code> — и так для каждой сцены.
        Либо загрузи промты отдельным файлом ниже (тогда абзац №N сценария = промт №N).</small>
      </label>
      <label>Промты картинок (txt, необязательно)
        <input type="file" name="prompts" accept=".txt,text/plain">
        <small>По одному промту на строку. Нужен, только если в сценарии нет строк <code>IMG:</code>.</small>
      </label>
      <div class="row">
        <label>Голос (шаблон Voicer)
          <select name="template_id" id="template-select">
            <option value="">— по умолчанию —</option>
          </select>
        </label>
        <label>Провайдер картинок
          <select name="provider" id="provider-select"></select>
        </label>
        <label>Модель
          <select name="model" id="model-select"></select>
        </label>
        <label>Формат кадра
          <select name="aspect_ratio" id="aspect-select"></select>
        </label>
      </div>
      <button type="submit" id="submit-btn">Создать видео</button>
      <div id="form-error" class="error"></div>
    </form>
  </section>

  <section class="card">
    <h2>Задачи</h2>
    <div id="jobs">Пока нет задач.</div>
  </section>

  <section class="card">
    <h2>Аккаунт и лимиты</h2>
    <div id="account">Загрузка…</div>
  </section>
</main>

<script src="/static/app.js"></script>
</body>
</html>
